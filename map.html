<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MapGuessr - Guess the Map</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Globe.gl & dependencies -->
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <link rel="icon" type="image/png" href="icons8-flag-64.png">
</head>

<body>
    <header>
        <div class="container">
            <h1 class="logo">
                <img src="icons8-flag-64.png" alt="Flaggi Icon" width="48" height="48">
                Flaggi
            </h1>
            <nav>
                <a href="index.html">Flags Library</a>
                <a href="flag.html">FlagGuessr</a>
                <a href="map.html" class="active">MapGuessr</a>
            </nav>
        </div>
    </header>

    <div id="full-width-map-wrapper">
        <div class="game-display" id="map-container">
            <!-- Map will be rendered here via D3 -->
            <button id="reset-zoom-btn" class="btn-reset-zoom" title="Reset Zoom to Target">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19 12h3"></path>
                    <path d="M2 12h3"></path>
                    <path d="M12 2v3"></path>
                    <path d="M12 19v3"></path>
                </svg>
            </button>
        </div>
    </div>

    <main class="container" style="padding-top: 0;">
        <div class="map-game-container" id="game-area">
            <div class="input-group">
                <div
                    style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 0.5rem;">
                    <label for="country-input" style="margin-bottom: 0;">What country is this?</label>
                    <span style="font-weight: bold; color: black; font-size: 1rem;">Streak: <span id="streak-counter"
                            style="color: grey;">0</span></span>
                </div>
                <input type="text" id="country-input" class="input-box" placeholder="Start typing..."
                    autocomplete="off">
                <ul id="suggestions" class="suggestions-list"></ul>
                <!-- Submit button removed for auto-submit -->
            </div>

            <div id="feedback" class="feedback"></div>

            <div class="game-controls">
                <button id="next-btn" class="btn btn-secondary visible" style="display: none;">Next Map</button>
                <button id="reveal-btn" class="btn btn-reveal visible" style="margin-top: 1rem;">Reveal Answer</button>
            </div>
        </div>
    </main>



    <footer style="margin-top: 2rem;">
        <p class="credits" style="margin: 0; font-size: 0.9rem;">
            Made by <strong><a href="https://aatifahmad123.dev/" target="_blank" rel="noopener noreferrer"
                    style="color: var(--text-primary); text-decoration: none;">Aatif Ahmad</a></strong> | Thanks to <a
                href="https://flagpedia.net" target="_blank" rel="noopener noreferrer"
                style="color: var(--accent-color); text-decoration: none; font-weight: bold;">flagpedia.net</a> for
            images and codes
        </p>
    </footer>


    <script src="app.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flaggi - Flags Library</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="icons8-flag-64.png">
</head>

<body>
    <header>
        <div class="container">
            <h1 class="logo">
                <img src="icons8-flag-64.png" alt="Flaggi Icon" width="48" height="48">
                Flaggi
            </h1>
            <nav>
                <a href="index.html" class="active">Flags Library</a>
                <a href="flag.html">FlagGuessr</a>
                <a href="map.html">MapGuessr</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="filter-controls">
            <button id="filter-all" class="filter-btn active">All 254 countries</button>
            <button id="filter-sovereign" class="filter-btn">195 Sovereign States</button>
        </div>
        <div id="flag-grid" class="flag-grid">
            <!-- Flags will be injected here by app.js -->
        </div>
    </main>

    <footer>
        <p class="credits" style="margin: 0; font-size: 0.9rem;">
            Made by <strong><a href="https://aatifahmad123.dev/" target="_blank" rel="noopener noreferrer"
                    style="color: var(--text-primary); text-decoration: none;">Aatif Ahmad</a></strong> | Thanks to <a
                href="https://flagpedia.net" target="_blank" rel="noopener noreferrer"
                style="color: var(--accent-color); text-decoration: none; font-weight: bold;">flagpedia.net</a> for
            images and codes
        </p>
    </footer>



    <script src="app.js"></script>
</body>

</html>
